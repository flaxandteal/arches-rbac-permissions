name: Static checking
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dev dependencies
        run: uv sync --group dev

      - name: Ruff (tests)
        # The bundled tests must stay lint-clean: this is the enforced gate.
        run: uv run ruff check tests

      - name: Ruff (application packages, informational)
        # The app packages carry pre-existing lint/type debt (docstrings, typing)
        # tracked as a roadmap item in the README. Surface it without failing the
        # build until that cleanup lands.
        continue-on-error: true
        run: >-
          uv run ruff check
          arches_rbac_permissions arches_inclusion_rule arches_semantic_roles
          arches_user_datatype arches_saved_search
