name: Test
on: [push, pull_request]

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install GDAL system library
        # Arches imports django.contrib.gis, which dlopen()s libgdal at import
        # time, so the unit tests cannot even collect without it.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run unit tests
        # tests/unit runs under tests/settings.py and never touches the
        # database or Elasticsearch (see pyproject [tool.pytest.ini_options]).
        run: uv run --python ${{ matrix.python-version }} pytest
